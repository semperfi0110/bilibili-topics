name: Daily Topic Generation

on:
  schedule:
    - cron: '0 2 * * *'  # 每天 02:00 UTC = 10:00 北京时间
  workflow_dispatch:  # 支持手动触发

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions: write-all
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install requests

      - name: Generate daily topics
        run: python scripts/generator.py

      - name: Commit and push
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git config --local push.default current
          echo "=== Debug: listing history directory ==="
          ls -la history/ || echo "history/ does not exist"
          echo "=== Debug: git status ==="
          git status
          git add -A history/
          echo "=== Debug: after git add ==="
          git status
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            echo "Changes detected, committing..."
            git commit -m "Update: $(date +%Y-%m-%d)"
            git push -u origin main
          fi
